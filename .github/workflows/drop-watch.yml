name: Drop watch (立刻订)

# 高频盯放票时刻：每 10 分钟算一次，若某收藏餐厅此刻正处于放票窗口（时间已核实），
# 就发一条「立刻订」直达 Tock 的高优先级推送。push_state.json 去重，保证每次放票只推一次。
#
# ⚠️ 定时触发已暂停：没设 NTFY_TOPIC 之前，这个 workflow 跑了也只是空算、不推任何东西，
#   反而每次跑都给仓库主人发 GitHub Actions 失败/通知邮件，纯打扰。
#   等你装好 ntfy app、设好仓库 secret NTFY_TOPIC 后，把下面 schedule 那两行的注释去掉即可恢复定时盯票。
on:
  # schedule:
  #   - cron: "*/10 * * * *"   # 每 10 分钟（设好 NTFY_TOPIC 后再启用）
  workflow_dispatch:

# 避免与每日 reservations.yml / 自身并发提交打架
concurrency:
  group: reservations-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  drop-watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compute + open-now push
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          cd pipeline
          python fetch_reservations.py --notify-open
      - name: Commit push state
        run: |
          git config user.name "reservations-bot"
          git config user.email "bot@users.noreply.github.com"
          # push_state.json 只有真的推过票才会生成；用 -A 容忍它不存在，避免 pathspec 报错使整步失败
          git add -A public/data/reservations.json pipeline/push_state.json
          git diff --staged --quiet || git commit -m "drop-watch: 放票推送状态 $(date -u +%FT%TZ)"
          git pull --rebase --autostash || true
          git push
